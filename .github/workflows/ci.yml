name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - trunk

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package root
        id: detect
        run: |
          set -eo pipefail
          ROOT=""
          if [ -f package.json ]; then
            ROOT="."
          elif [ -f admin-app/package.json ]; then
            ROOT="admin-app"
          fi

          if [ -z "$ROOT" ]; then
            echo "No package.json found; skipping Node workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Detected package root: $ROOT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "workdir=$ROOT" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm
        if: steps.detect.outputs.skip != 'true'
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        if: steps.detect.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: |
            ${{ steps.detect.outputs.workdir }}/pnpm-lock.yaml
            ${{ steps.detect.outputs.workdir }}/package.json

      - name: Install dependencies
        if: steps.detect.outputs.skip != 'true'
        working-directory: ${{ steps.detect.outputs.workdir }}
        run: pnpm install --frozen-lockfile

      - name: Run format check
        if: steps.detect.outputs.skip != 'true'
        working-directory: ${{ steps.detect.outputs.workdir }}
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.format ? 0 : 1)"; then
            pnpm format --check
          else
            echo 'No format script defined; skipping.'
          fi

      - name: Run lint
        if: steps.detect.outputs.skip != 'true'
        working-directory: ${{ steps.detect.outputs.workdir }}
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.lint ? 0 : 1)"; then
            pnpm lint
          else
            echo 'No lint script defined; skipping.'
          fi

      - name: Run tests
        if: steps.detect.outputs.skip != 'true'
        working-directory: ${{ steps.detect.outputs.workdir }}
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.test ? 0 : 1)"; then
            pnpm test -- --watch=false
          else
            echo 'No test script defined; skipping.'
          fi

      - name: Build
        if: steps.detect.outputs.skip != 'true'
        working-directory: ${{ steps.detect.outputs.workdir }}
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.build ? 0 : 1)"; then
            pnpm build
          else
            echo 'No build script defined; skipping.'
          fi

      - name: Upload build output (if available)
        if: steps.detect.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          if-no-files-found: ignore
          path: |
            ${{ steps.detect.outputs.workdir }}/.next
            ${{ steps.detect.outputs.workdir }}/build
            ${{ steps.detect.outputs.workdir }}/dist
